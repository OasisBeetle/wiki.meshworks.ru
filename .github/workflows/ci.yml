name: CI

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'static/**'
      - 'sidebars.ts'
      - 'docusaurus.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'
      - 'playwright.config.ts'
      - 'e2e/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'src/**'
      - 'static/**'
      - 'sidebars.ts'
      - 'docusaurus.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'eslint.config.mjs'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'
      - 'playwright.config.ts'
      - 'e2e/**'
      - '.github/workflows/ci.yml'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint, build & test
        run: npm run check

      - name: Upload preview artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: wiki-build
          path: build
          retention-days: 7
          if-no-files-found: error

  browser-regression:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Build site
        run: npm run build

      - name: Run browser regression tests
        run: npm run test:browser

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
          if-no-files-found: ignore
